- hosts: docker
  become: yes

  tasks:
    - name: Mettre à jour apt
      apt:
        update_cache: yes

    - name: Installer les dépendances Docker
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Créer le répertoire keyrings
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Ajouter la clé GPG Docker
      shell: curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Ajouter le repository Docker
      shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Installer Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Démarrer et activer Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Ajouter l'utilisateur au groupe docker
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    # ============================================
    # 🐳 Déployer le container httpbin
    # ============================================

    - name: Lancer le container httpbin
      community.docker.docker_container:
        name: httpbin
        image: kennethreitz/httpbin
        state: started
        restart_policy: always
        ports:
          - "8080:80"

    # ============================================
    # 🐳 Déployer le container nginx (scroll.dgcf.ovh)
    # ============================================

    - name: Créer le répertoire pour la page nginx
      file:
        path: /opt/nginx-scroll
        state: directory
        mode: "0755"

    - name: Créer la page HTML personnalisée
      copy:
        content: "<h1>Réponse de la VM3</h1>"
        dest: /opt/nginx-scroll/index.html
        mode: "0644"

    - name: Lancer le container nginx
      community.docker.docker_container:
        name: nginx-scroll
        image: nginx:latest
        state: started
        restart_policy: always
        ports:
          - "80:80"
        volumes:
          - /opt/nginx-scroll/index.html:/usr/share/nginx/html/index.html:ro

    # ============================================
    # 🧃 Déployer le container Juice Shop
    # ============================================

    - name: Lancer le container Juice Shop
      community.docker.docker_container:
        name: juice-shop
        image: bkimminich/juice-shop
        state: started
        restart_policy: always
        ports:
          - "3000:3000"

    # ============================================
    # 🔓 Déployer le container DVWA
    # ============================================

    - name: Lancer le container DVWA
      community.docker.docker_container:
        name: dvwa
        image: vulnerables/web-dvwa
        state: started
        restart_policy: always
        ports:
          - "4280:80"

    # ============================================
    # 🐐 Déployer le container WebGoat
    # ============================================

    - name: Lancer le container WebGoat
      community.docker.docker_container:
        name: webgoat
        image: webgoat/webgoat
        state: started
        restart_policy: always
        ports:
          - "8081:8080"
          - "9090:9090"

    # ============================================
    # Déployer le container JSON Server
    # ============================================

    - name: Créer le répertoire pour json-server
      file:
        path: /opt/json-server
        state: directory
        mode: "0755"

    - name: Copier le fichier db.json
      copy:
        src: files/db.json
        dest: /opt/json-server/db.json
        mode: "0644"

    - name: Lancer le container json-server
      community.docker.docker_container:
        name: json-server
        image: vimagick/json-server
        state: started
        restart_policy: always
        ports:
          - "3001:3000"
        volumes:
          - /opt/json-server/db.json:/data/db.json:ro
