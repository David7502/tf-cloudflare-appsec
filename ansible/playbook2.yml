- hosts: web2
  become: yes

  tasks:
    - name: Inclure les variables locales
      include_vars: vars.local.yml

    - name: Mettre à jour apt
      apt:
        update_cache: yes

    - name: Installer nginx
      apt:
        name: nginx
        state: present

    - name: Démarrer nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Page personnalisée pour VM2
      copy:
        content: "<h1>Deployed with Terraform + Ansible on region Latam- VM2</h1>"
        dest: /var/www/html/index.html

    # ============================================
    # ☁️ Installation et configuration Cloudflared
    # ============================================

    - name: Créer le répertoire keyrings
      file:
        path: /usr/share/keyrings
        state: directory
        mode: "0755"

    - name: Ajouter la clé GPG de Cloudflare
      shell: curl -fsSL https://pkg.cloudflare.com/cloudflare-public-v2.gpg | tee /usr/share/keyrings/cloudflare-public-v2.gpg >/dev/null
      args:
        creates: /usr/share/keyrings/cloudflare-public-v2.gpg

    - name: Ajouter le repository Cloudflared
      lineinfile:
        path: /etc/apt/sources.list.d/cloudflared.list
        line: "deb [signed-by=/usr/share/keyrings/cloudflare-public-v2.gpg] https://pkg.cloudflare.com/cloudflared any main"
        create: true
        mode: "0644"

    - name: Installer cloudflared
      apt:
        name: cloudflared
        state: present
        update_cache: yes

    - name: Créer le répertoire de configuration cloudflared
      file:
        path: /etc/cloudflared
        state: directory
        mode: "0755"

    - name: Configurer le tunnel cloudflared
      copy:
        dest: /etc/cloudflared/config.yml
        content: |
          tunnel: {{ cloudflared_tunnel_id2 }}
          credentials-file: /etc/cloudflared/{{ cloudflared_tunnel_id2 }}.json
          ingress:
            - hostname: {{ cloudflared_hostname2 }}
              service: http://localhost:80
            - service: http_status:404

    - name: Créer le fichier credentials cloudflared
      copy:
        dest: /etc/cloudflared/{{ cloudflared_tunnel_id2 }}.json
        content: "{{ cloudflared_credentials2 | to_json }}"

    - name: Installer le service cloudflared
      command: cloudflared service install
      args:
        creates: /etc/systemd/system/cloudflared.service

    - name: Démarrer et activer cloudflared
      service:
        name: cloudflared
        state: started
        enabled: yes
