- hosts: web2
  become: yes

  tasks:
    - name: Mettre à jour apt
      apt:
        update_cache: yes

    - name: Installer nginx
      apt:
        name: nginx
        state: present

    - name: Démarrer nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Page personnalisée pour VM2
      copy:
        content: "<h1>Deployed with Terraform + Ansible on region Latam- VM2</h1>"
        dest: /var/www/html/index.html
